<!DOCTYPE html>
<html>
<head>
    <title>Trabalho 3</title>
    <link rel="shortcut icon" href="./favicon.ico">
    <link rel="stylesheet" href="./html/resources/default.css">
    <link rel="stylesheet" href="./resources/loadingScreen.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">  
</head>

<body>
  <script async src="https://unpkg.com/es-module-shims@1.3.6/dist/es-module-shims.js"></script>  
  <script type="importmap"> 
    {"imports": {"three": "./build/three.module.js"}} 
  </script> 

  <div id="orientationOverlay">
    <div class="overlay-card">
      <h2>Vire o celular</h2>
      <p>Este jogo funciona melhor em modo horizontal.</p>
    </div>
  </div>

  <div id="mobileControls" aria-hidden="true">
    <div id="joystickBase">
      <div id="joystickKnob"></div>
    </div>
  </div>

  <div id="loading-screen">
    <div id="loader"></div>
      <button id="myBtn" disabled>
          Loading... 0%
      </button>
  </div>

  <div id="gameOverOverlay">
    <div id="gameOverBox">
        <h1>VOCÊ MORREU</h1>
        <button id="restartBtn">Reiniciar</button>
    </div>
  </div>

  <div id="webgl-output">               
    <script type="module" src="main.js"></script>
  </div>
</body>
</html>
